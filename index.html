<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTT Material Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE6;
    --border: #E2DDD6; --text: #1C1917; --muted: #78716C;
    --hint: #A8A29E; --accent: #2E6BE6; --accent-bg: #EEF3FD; --accent-text: #1D4ED8;
    --sidebar-w: 230px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 1.25rem 1rem; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    transition: transform .25s ease;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .logo-text { font-size: 13px; font-weight: 600; }
  .logo-sub { font-size: 11px; color: var(--muted); }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--hint); margin-bottom: 5px; margin-top: 1rem; }
  .level-btn { width: 100%; text-align: left; padding: 6px 9px; border-radius: 7px; border: none; background: transparent; color: var(--muted); font-family: inherit; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background .1s, color .1s; margin-bottom: 2px; }
  .level-btn:hover { background: var(--surface2); color: var(--text); }
  .level-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .level-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .5; flex-shrink: 0; }
  .level-btn.active .level-dot { opacity: 1; }
  .cat-group { margin-bottom: .25rem; }
  .cat-group-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--hint); padding: 8px 9px 3px; }
  .cat-btn { width: 100%; text-align: left; padding: 7px 9px; border-radius: 7px; border: none; background: transparent; color: var(--muted); font-family: inherit; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background .1s, color .1s; margin-bottom: 1px; }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .cat-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 11px; color: var(--hint); line-height: 1.6; }

  /* ── Main ── */
  .main { flex: 1; padding: 1.25rem 1.5rem; min-width: 0; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; gap: 10px; }
  .top-bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .menu-btn {
    display: none;
    align-items: center; justify-content: center;
    width: 36px; height: 36px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); cursor: pointer; font-size: 18px;
    transition: background .1s;
  }
  .menu-btn:hover { background: var(--surface2); }
  .top-bar-titles { min-width: 0; }
  .page-title { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .page-meta { font-size: 13px; color: var(--muted); }
  .top-bar-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .act-btn { font-size: 12px; font-family: inherit; padding: 6px 14px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface); color: var(--text); cursor: pointer; white-space: nowrap; }
  .act-btn:hover { background: var(--surface2); }
  .act-btn.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent-text); }

  /* ── Cards ── */
  .card-grid.hide-labels .card-footer { visibility: hidden; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
  .dtt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; aspect-ratio: 3/4; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: box-shadow .15s, transform .15s; }
  .dtt-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.09); transform: translateY(-2px); }
  .card-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--surface2); overflow: hidden; }
  .card-img-wrap img { width: 75%; height: 75%; object-fit: contain; display: block; }
  .card-footer { padding: 9px 10px 10px; border-top: 1px solid var(--border); text-align: center; }
  .card-word { font-size: 15px; font-weight: 600; line-height: 1.2; }
  .card-hint { font-size: 10px; color: var(--hint); margin-top: 2px; font-style: italic; }
  .sight-card-img { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--surface2); }
  .sight-word-big { font-size: 48px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 0; color: var(--hint); }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }

  /* ── Overlay (mobile) ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 99;
    opacity: 0; transition: opacity .25s;
  }
  .overlay.visible { opacity: 1; }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    .shell { flex-direction: column; }
    .sidebar {
      position: fixed; left: 0; top: 0; height: 100vh;
      transform: translateX(-100%);
      box-shadow: 4px 0 20px rgba(0,0,0,.12);
    }
    .sidebar.open { transform: translateX(0); }
    .overlay { display: block; }
    .main { padding: 1rem; }
    .menu-btn { display: flex; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    .act-btn { padding: 6px 10px; font-size: 11px; }
    .page-title { font-size: 16px; }
  }

  /* ── Tablet ── */
  @media (min-width: 701px) and (max-width: 1024px) {
    :root { --sidebar-w: 200px; }
    .sidebar { padding: .9rem .75rem; }
    .main { padding: 1.25rem; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  }

  @media print {
    .sidebar, .top-bar, .overlay { display: none !important; }
    .main { padding: 0; }
    body { background: white; }
    .card-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .dtt-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-mark">D</div>
      <div><div class="logo-text">DTT Generator</div><div class="logo-sub">ABA materials · ages 2–8</div></div>
    </div>
    <div class="sidebar-label">Skill level</div>
    <button class="level-btn active" onclick="setLevel(this,'early')"><span class="level-dot"></span>Early learner</button>
    <button class="level-btn" onclick="setLevel(this,'intermediate')"><span class="level-dot"></span>Intermediate</button>
    <div class="sidebar-label" style="margin-top:1.25rem;">Categories</div>
    <div class="cat-group">
      <div class="cat-group-label">Nouns</div>
      <button class="cat-btn" onclick="loadCat(this,'animals')"><span class="cat-icon">🐘</span>Animals</button>
      <button class="cat-btn" onclick="loadCat(this,'food')"><span class="cat-icon">🍎</span>Food &amp; drink</button>
      <button class="cat-btn" onclick="loadCat(this,'clothing')"><span class="cat-icon">👕</span>Clothing</button>
      <button class="cat-btn" onclick="loadCat(this,'vehicles')"><span class="cat-icon">🚗</span>Vehicles</button>
      <button class="cat-btn" onclick="loadCat(this,'household')"><span class="cat-icon">🏠</span>Household items</button>
      <button class="cat-btn" onclick="loadCat(this,'bodyparts')"><span class="cat-icon">🖐</span>Body parts</button>
    </div>
    <div class="cat-group">
      <div class="cat-group-label">Actions</div>
      <button class="cat-btn" onclick="loadCat(this,'actions')"><span class="cat-icon">🏃</span>Action verbs</button>
    </div>
    <div class="cat-group">
      <div class="cat-group-label">Community</div>
      <button class="cat-btn" onclick="loadCat(this,'helpers')"><span class="cat-icon">👩‍⚕️</span>Community helpers</button>
      <button class="cat-btn" onclick="loadCat(this,'places')"><span class="cat-icon">🏫</span>Places</button>
    </div>
    <div class="cat-group">
      <div class="cat-group-label">Social</div>
      <button class="cat-btn" onclick="loadCat(this,'emotions')"><span class="cat-icon">😊</span>Emotions</button>
    </div>
    <div class="cat-group">
      <div class="cat-group-label">Academic</div>
      <button class="cat-btn" onclick="loadCat(this,'colors')"><span class="cat-icon">🎨</span>Colors</button>
      <button class="cat-btn" onclick="loadCat(this,'shapes')"><span class="cat-icon">🔷</span>Shapes</button>
      <button class="cat-btn" onclick="loadCat(this,'numbers')"><span class="cat-icon">🔢</span>Numbers 1–10</button>
      <button class="cat-btn" onclick="loadCat(this,'letters')"><span class="cat-icon">🔤</span>Letters A–Z</button>
    </div>
    <div class="cat-group">
      <div class="cat-group-label">Sight words</div>
      <button class="cat-btn" onclick="loadCat(this,'dolch_preprimer')"><span class="cat-icon">📖</span>Dolch pre-primer</button>
      <button class="cat-btn" onclick="loadCat(this,'dolch_primer')"><span class="cat-icon">📗</span>Dolch primer</button>
    </div>
    <div class="sidebar-footer">Print-ready 3×4 in cards.<br>Select a category to begin.</div>
  </nav>

  <main class="main">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
        <div class="top-bar-titles">
          <div class="page-title" id="pageTitle">Select a category</div>
          <div class="page-meta" id="pageMeta">Choose from the sidebar to get started</div>
        </div>
      </div>
      <div class="top-bar-actions">
        <button class="act-btn" id="labelToggle" style="display:none" onclick="toggleLabels(this)">🏷 Hide labels</button>
        <button class="act-btn" id="printBtn" style="display:none" onclick="window.print()">🖨 Print</button>
      </div>
    </div>
    <div class="card-grid" id="grid">
      <div class="empty-state">
        <div class="empty-icon">🗂</div>
        <div class="empty-title">Pick a category from the sidebar</div>
      </div>
    </div>
  </main>
</div>

function setLevel(btn, l) {
  document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentLevel = l;
  if (currentCat) loadCat(document.querySelector(".cat-btn.active"), currentCat);
}

function loadCat(btn, cat) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));

  currentCat = cat;

  const data = (LIBRARY[cat] || {})[currentLevel] || LIBRARY[cat]?.early || [];

  document.getElementById("pageMeta").textContent = `${levelLabel}  ·  ${data.length} cards`;
  document.getElementById("printBtn").style.display = "inline-block";
  document.getElementById("labelToggle").style.display = "inline-block";
  if (window.innerWidth <= 700) closeSidebar();

    Diamond:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 95,50 50,95 5,50" fill="#E84545"/></svg>`,
    Oval:      `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="50" rx="34" ry="46" fill="#E84545"/></svg>`,
    Hexagon:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 93,27 93,73 50,95 7,73 7,27" fill="#E84545"/></svg>`,
    Pentagon:  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 97,38 79,92 21,92 3,38" fill="#E84545"/></svg>`,
  };

  // SVG color swatches — all circles, same size, each in its actual color
  const COLOR_SVG = {
    Red:    `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#E53935"/></svg>`,
    Blue:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#1E88E5"/></svg>`,
    Yellow: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#FDD835"/></svg>`,
    Green:  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#43A047"/></svg>`,
    Orange: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#FB8C00"/></svg>`,
    Purple: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#8E24AA"/></svg>`,
    Pink:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#F06292"/></svg>`,
    Black:  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#212121"/></svg>`,
    White:  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="2"/></svg>`,
    Brown:  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#795548"/></svg>`,
    Gray:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#757575"/></svg>`,
    Gold:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#FFB300"/></svg>`,
  };

  document.getElementById("grid").innerHTML = data.map(c => {
    const label = typeof c === "string" ? c : c.label;
    const hint  = typeof c === "string" ? c.hint || "" : c.hint || "";
    const num   = c.num || null;

    if (isSight) {
      return `<div class="dtt-card">
        <div class="sight-card-img"><span class="sight-word-big">${label}</span></div>
        <div class="card-footer"><div class="card-word">${label}</div><div class="card-hint">${hint}</div></div>
      </div>`;
    }

    if (isLetter) {
      return `<div class="dtt-card">
        <div class="sight-card-img"><span style="font-size:96px;font-weight:700;color:var(--text);line-height:1;font-family:'DM Sans',sans-serif;">${label}</span></div>
        <div class="card-footer"><div class="card-word">${label}</div></div>
      </div>`;
    }

    if (isNumber) {
      return `<div class="dtt-card">
        <div class="sight-card-img"><span style="font-size:96px;font-weight:700;color:var(--accent);line-height:1;font-family:'DM Sans',sans-serif;">${num}</span></div>
        <div class="card-footer"><div class="card-word">${label}</div></div>
      </div>`;
    }

    if (isShape) {
      const svg = SHAPE_SVG[label] || "";
      return `<div class="dtt-card">
        <div class="card-img-wrap" style="padding:18px;">
          <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${svg}</div>
        </div>
        <div class="card-footer"><div class="card-word">${label}</div><div class="card-hint">${hint}</div></div>
      </div>`;
    }

    if (isColor) {
      const svg = COLOR_SVG[label] || "";
      return `<div class="dtt-card">
        <div class="card-img-wrap" style="padding:18px;">
          <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${svg}</div>
        </div>
        <div class="card-footer"><div class="card-word">${label}</div></div>
      </div>`;
    }

    const imgSrc = IMGS[label] || null;

    return `<div class="dtt-card">
      <div class="card-img-wrap">
        ${imgSrc ? `<img src="${imgSrc}" alt="${label}" />` : `<span style="font-size:52px">${label}</span>`}
      </div>
      <div class="card-footer">
        <div class="card-word">${label}</div>
        ${hint ? `<div class="card-hint">${hint}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const isOpen = sidebar.classList.toggle("open");
  overlay.classList.toggle("visible", isOpen);
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("visible");
}
function toggleLabels(btn) {
  const grid = document.getElementById("grid");
  const hiding = !grid.classList.contains("hide-labels");
  grid.classList.toggle("hide-labels", hiding);
  btn.textContent = hiding ? "🏷 Show labels" : "🏷 Hide labels";
  btn.classList.toggle("active", hiding);
}
</script>
</body>
</html>
